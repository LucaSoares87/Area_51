name: CD - Build, Push and Deploy

on:
  push:
    branches:
      - main
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  pre-deploy-tests:
    name: Pre-deploy tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
          AUTH_SECRET_KEY: ci-test-secret-key-not-for-production
          ADMIN_EMAIL: admin@test.local
          ADMIN_PASSWORD: test-password-123
          DETECTION_MOCK_INFERENCE: "true"
        run: |
          pytest tests/ -v --tb=short

  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: pre-deploy-tests

    outputs:
      image_tags: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
            GIT_SHA=${{ github.sha }}

      - name: Build summary
        run: |
          echo "## Docker build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ steps.version.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Digest | \`${{ steps.build.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"

  deploy-staging:
    name: Deploy staging
    runs-on: ubuntu-latest
    needs: build-and-push

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'

    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT || 22 }}
          script: |
            set -e

            cd /opt/aerial-housing-detection

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.version }}"
            docker pull "$IMAGE"

            cp .env ".env.backup.$(date +%Y%m%d_%H%M%S)"

            sed -i "s|^APP_IMAGE=.*|APP_IMAGE=$IMAGE|" .env || true
            sed -i "s|^MODEL_VERSION=.*|MODEL_VERSION=${{ needs.build-and-push.outputs.version }}|" .env || true

            docker-compose down
            docker-compose up -d

            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Staging is healthy"
                exit 0
              fi

              sleep 2
            done

            docker-compose logs --tail=80
            exit 1

      - name: Smoke test staging
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$STAGING_URL/health")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with status $HTTP_CODE"
            exit 1
          fi

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: build-and-push

    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')

    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          script: |
            set -e

            cd /opt/aerial-housing-detection

            IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.version }}"
            BACKUP_DIR="/opt/backups/aerial/$(date +%Y%m%d_%H%M%S)"

            mkdir -p "$BACKUP_DIR"

            cp .env "$BACKUP_DIR/.env"
            cp docker-compose.yml "$BACKUP_DIR/docker-compose.yml"

            docker pull "$IMAGE"

            sed -i "s|^APP_IMAGE=.*|APP_IMAGE=$IMAGE|" .env || true
            sed -i "s|^MODEL_VERSION=.*|MODEL_VERSION=${{ needs.build-and-push.outputs.version }}|" .env || true

            docker-compose up -d

            for i in $(seq 1 60); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Production is healthy"
                exit 0
              fi

              sleep 3
            done

            cp "$BACKUP_DIR/.env" .env
            cp "$BACKUP_DIR/docker-compose.yml" docker-compose.yml

            docker-compose up -d
            docker-compose logs --tail=80

            exit 1

      - name: Smoke test production
        run: |
          PRODUCTION_URL="${{ vars.PRODUCTION_URL }}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/health")

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with status $HTTP_CODE"
            exit 1
          fi

  notify:
    name: Pipeline summary
    runs-on: ubuntu-latest
    needs:
      - pre-deploy-tests
      - build-and-push
      - deploy-staging
      - deploy-production

    if: always()

    steps:
      - name: Summary
        run: |
          echo "## CD summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pre-deploy tests | ${{ needs.pre-deploy-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build and push | ${{ needs.build-and-push.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Staging | ${{ needs.deploy-staging.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Production | ${{ needs.deploy-production.result }} |" >> "$GITHUB_STEP_SUMMARY"